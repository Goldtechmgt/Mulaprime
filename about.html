}

.about-icon{
  width:70px;
  height:70px;
  background:rgba(250,204,21,0.1);
  border-radius:20px;
  display:flex;
  align-items:center;

  font-size:30px;
  color:#facc15;
  margin-bottom:20px;
}

.about-box h3{

.about-box p{

.team-card h2{

.team-card p{

  max-width:750px;
  margin:auto;
  line-height:1.9;
  font-size:17px;
}

.team-btn{
  margin-top:30px;
  background:#facc15;
  color:black;
  border:none;
  padding:15px 35px;
  border-radius:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

.team-btn:hover{
  transform:scale(1.05);
}

/* ===== MOBILE ===== */

@media(max-width:700px){

  .about-title{
    font-size:30px;
  }

  .team-card{
